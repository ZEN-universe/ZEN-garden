name: Tests

# Define when to run
on:
  schedule:
    - cron:  '30 4 1 * *'
  push:
    branches: ['*']

  pull_request:
    branches: ['*']

  workflow_dispatch:

# Env variables
env:
  CACHE_NUMBER: 0  # increase to reset cache manually

# Jobs
jobs:
  check_skiptests:
    runs-on: ubuntu-latest
    outputs:
      skiptests: ${{ steps.check_commit.outputs.skiptests }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for '#skiptests' in commit messages
        id: check_commit
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            commit_message=$(git log -1 --pretty=%B)
          else
            commit_message="${{ github.event.head_commit.message }}"
          fi

          if [[ "$commit_message" =~ "#skiptests" ]]; then
            skip="true"
          else
            skip="false"
          fi
          echo "skiptests=$skip" >> $GITHUB_ENV
          echo "skiptests=$skip" >> $GITHUB_OUTPUT

  matrix_prep:
    if: ${{ github.repository == 'ZEN-universe/ZEN-garden' && needs.check_skiptests.outputs.skiptests == 'false' }}
    needs: check_skiptests
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Env File
        id: check-env-file
        uses: tj-actions/changed-files@v46
        with:
          files: |
            zen_garden_env.yml

      - name: Set Env
        # trigger if env file change or on schedule
        if: ${{ steps.check-env-file.outputs.any_changed == 'true' || github.event_name == 'schedule' }}
        run: echo "ENV_STATE=env_change" >> $GITHUB_ENV

      - id: set-matrix
        uses: JoshuaTheMiller/conditional-build-matrix@main
        with:
          # Run filter -> see matrix_includes.json!
          filter: '[?runs_when==`${{ env.ENV_STATE }}` || runs_when==`${{ github.event_name }}` || runs_when==`always`]'

  build:
    if: ${{ github.repository == 'ZEN-universe/ZEN-garden' && needs.check_skiptests.outputs.skiptests == 'false' }}
    # the testing
    needs: matrix_prep
    strategy:
      fail-fast: false # if true all jobs are cancelled if one fails
      matrix: ${{fromJson(needs.matrix_prep.outputs.matrix)}}

    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    steps:
      # checkout the dev branch
      - uses: actions/checkout@v4

      # setup the conda env
      - name: Setup Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
            miniforge-variant: Miniforge3
            miniforge-version: latest
            activate-environment: zen-garden-env
            use-mamba: true

      # date for the cache
      - name: Set cache date
        run: echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV

      # reset cache if env file changed
      - uses: actions/cache@v3
        with:
          path: ${{ matrix.prefix }}
          key: ${{ matrix.label }}-conda-${{ hashFiles('zen_garden_env.yml') }}-${{ env.DATE }}-${{ env.CACHE_NUMBER }}
        id: cache

      # This step is cached in case the env file was not changed
      - name: Update environment
        run: mamba env update -f zen_garden_env.yml
        if: steps.cache.outputs.cache-hit != 'true'

      - name: Install package
        shell: bash -l {0}
        run: pip install -e .

  bump_version:
    if: ${{ github.repository == 'ZEN-universe/ZEN-garden' && needs.check_skiptests.outputs.skiptests == 'false' && github.event_name == 'push'}}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for tags and full history

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate new branch name
        id: vars
        run: |
          BRANCH_NAME="version-bump-$(date +'%Y%m%d%H%M%S')"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Create new branch
        run: |
          git checkout -b ${{ steps.vars.outputs.branch_name }}

      - name: Install bumpversion
        run: |
          python -m pip install --upgrade pip
          pip install bumpversion

      # Step to fetch the PR body and determine version bump type
      - name: Get PR body and determine bump type
        id: pr_info
        run: |
          PR_BODY=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" | jq -r '.body')
          
          echo "PR Body: $PR_BODY"
          
          # Determine bump type based on PR body
          if [[ "$PR_BODY" =~ "#major" ]]; then
            echo "bump_type=major" >> $GITHUB_ENV
          elif [[ "$PR_BODY" =~ "#minor" ]]; then
            echo "bump_type=minor" >> $GITHUB_ENV
          else
            echo "bump_type=patch" >> $GITHUB_ENV
          fi

        # For debugging
      - name: Dry run bumpversion with appropriate type
        run: |
          bumpversion ${{ env.bump_type }} --dry-run  # --dry-run shows what would change
          git diff  # Check what files are being modified

      # Run bumpversion with the determined type
      - name: Run bumpversion with appropriate type
        run: |
          bumpversion ${{ env.bump_type }}  # Will be 'patch', 'minor', or 'major'
          git diff

      - name: Check for changes after bump
        run: |
          git log --oneline -n 2
          git show HEAD
          git branch
          git status
          git diff --name-only  # Check which files have changed
          git log -n 1  # Check the last commit, to see if a version bump commit was made

      # - name: Commit version bump changes
      #   run: |
      #     git add bumpversion.cfg pyproject.toml
      #     git commit -m "Bump version"
      #     git push origin ${{ steps.vars.outputs.branch_name }} --follow-tags

      - name: Push all changes and tags
        run: |
          git push origin ${{ steps.vars.outputs.branch_name }} --follow-tags
          git push --tags  # Push all tags to the remote
          git push origin ${{ steps.vars.outputs.branch_name }}  # Push the branch

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Bump version"
          body: "Automated version bump"
#          base: main
          branch: ${{ steps.vars.outputs.branch_name }}
          delete-branch: true  # optional: auto-delete branch after merge

      - name: Enable Pull Request Automerge
        run: gh pr merge --merge --auto "1"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}      

  release:
    if: ${{ github.repository == 'ZEN-universe/ZEN-garden' && needs.check_skiptests.outputs.skiptests == 'false' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    name: "Create Github Release"
    needs: bump_version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-latest-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract tag version
        uses: actions-ecosystem/action-get-latest-tag@v1
        id: get-latest-tag
        with:
          semver_only: true

      - name: Check for major/minor version
        id: check_version
        run: |
          TAG=${{ steps.get-latest-tag.outputs.tag }}
          PATCH_VERSION=$(echo $TAG | cut -d. -f3)
          echo "patch=$PATCH_VERSION"
          echo "patch=$PATCH_VERSION" >> $GITHUB_ENV
          echo "tag=$TAG" >> $GITHUB_OUTPUT
  
          if [[ $PATCH_VERSION -eq 0 ]]; then
            echo "is_major_minor=true" >> $GITHUB_ENV
          else
            echo "is_major_minor=false" >> $GITHUB_ENV
          fi

      - name: Create GitHub Release
        if: env.is_major_minor == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get-latest-tag.outputs.tag }}
          release_name: Release ${{ steps.get-latest-tag.outputs.tag }}
          body: "Automated release for version ${{ steps.get-latest-tag.outputs.tag }} after major/minor version bump."
          draft: false
          prerelease: false

  build-package:
    if: ${{ github.repository == 'ZEN-universe/ZEN-garden' && needs.check_skiptests.outputs.skiptests == 'false' }}
    name: "Build and verify package"
    runs-on: ubuntu-latest
    needs: release

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
      - uses: hynek/build-and-inspect-python-package@v2
#
